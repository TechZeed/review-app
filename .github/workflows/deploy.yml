name: deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - api
          - web
          - ui
          - all
        default: api
      confirm:
        description: "Type 'deploy' to confirm"
        required: true
        type: string

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "Type 'deploy' to confirm."
            exit 1
          fi

  deploy:
    name: Deploy (${{ inputs.service }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: asia-southeast1
      CLOUDSQL_CONNECTION_NAME: ${{ secrets.CLOUDSQL_CONNECTION_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Remove .env files
        run: find . -name ".env*" -type f -delete && touch .env

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Deploy
        run: node deploy.js ${{ inputs.service }} dev

      - name: Smoke test (API)
        if: inputs.service == 'api' || inputs.service == 'all'
        run: |
          SERVICE_URL=$(gcloud run services describe review-api-dev \
            --region=${{ env.GCP_REGION }} \
            --format="value(status.url)" \
            --project=${{ env.GCP_PROJECT_ID }})

          for i in $(seq 1 5); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i: status $HTTP_STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Done
        run: echo "Deployed '${{ inputs.service }}' successfully"
