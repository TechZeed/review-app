name: migrate

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Migration action"
        required: true
        type: choice
        options:
          - up
          - down
          - status
        default: up
      confirm:
        description: "Type 'migrate' to confirm"
        required: true
        type: string

concurrency:
  group: migrate
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "migrate" ]; then
            echo "Type 'migrate' to confirm."
            exit 1
          fi

  migrate:
    name: Run migration (${{ inputs.action }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # All config from GitHub Secrets — nothing hardcoded. Mirrors the
    # single-source-of-truth pattern used for deploy (see deploy.yml).
    env:
      GCP_PROJECT_ID:           ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION:               ${{ secrets.GCP_REGION || 'asia-southeast1' }}
      CLOUDSQL_CONNECTION_NAME: ${{ secrets.CLOUDSQL_CONNECTION_NAME }}

    steps:
      - uses: actions/checkout@v4

      # Wipe any .env files that may have slipped in and create empty
      # placeholders so fs.existsSync paths in the codebase don't trip.
      - name: Remove all .env files
        run: |
          find . -name ".env*" -type f -print -delete
          touch .env
          touch .env.dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Proxy
        run: |
          ./cloud-sql-proxy ${{ env.CLOUDSQL_CONNECTION_NAME }} --port=5432 &
          sleep 3

      - name: Run migration
        working-directory: apps/api
        env:
          NODE_ENV: production
          # Proxy binding — always localhost:5432 since we just started
          # the proxy in that shape above. Not operator-configurable.
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          # Everything else from secrets. JWT_SECRET is required by the
          # zod env schema (env.ts) even though migrations don't use it.
          POSTGRES_DB:         ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:       ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:   ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET:          ${{ secrets.JWT_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCP_BUCKET_NAME:     ${{ secrets.GCP_BUCKET_NAME }}
        run: npx tsx src/db/cli.ts ${{ inputs.action }}
