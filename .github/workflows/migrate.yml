name: migrate

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Migration action"
        required: true
        type: choice
        options:
          - up
          - down
          - status
        default: up
      confirm:
        description: "Type 'migrate' to confirm"
        required: true
        type: string

concurrency:
  group: migrate
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "migrate" ]; then
            echo "Type 'migrate' to confirm."
            exit 1
          fi

  migrate:
    name: Run migration (${{ inputs.action }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: asia-southeast1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Proxy
        run: |
          ./cloud-sql-proxy ${{ secrets.CLOUDSQL_CONNECTION_NAME }} --port=5432 &
          sleep 3

      - name: Run migration
        working-directory: apps/api
        env:
          NODE_ENV: production
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: dev_review_db
          POSTGRES_USER: review_user
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: placeholder-not-needed-for-migration
          FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_BUCKET_NAME: humini-review-media-dev
        run: npx tsx src/db/cli.ts ${{ inputs.action }}
