name: deploy-staging

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - api
          - web
          - ui
          - all
        default: api
      confirm:
        description: "Type 'deploy-staging' to confirm staging deployment"
        required: true
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Trigger
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy-staging" ]; then
            echo "Confirmation failed. Input 'deploy-staging' to proceed."
            exit 1
          fi

  deploy:
    name: Deploy to Staging (${{ inputs.service }})
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: asia-southeast1
      GCP_ARTIFACT_REPOSITORY: review-apps
      CLOUDSQL_CONNECTION_NAME: ${{ secrets.CLOUDSQL_CONNECTION_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Remove .env files
        run: find . -name ".env*" -type f -delete && touch .env

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Deploy via deploy.js
        run: node deploy.js ${{ inputs.service }} staging

      - name: Smoke test (API only)
        if: inputs.service == 'api' || inputs.service == 'all'
        run: |
          SERVICE_URL=$(gcloud run services describe review-api-staging \
            --region=${{ env.GCP_REGION }} \
            --format="value(status.url)" \
            --project=${{ env.GCP_PROJECT_ID }})

          echo "Running smoke tests against $SERVICE_URL"

          # Health check with retries
          for i in $(seq 1 5); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              break
            fi
            echo "Attempt $i: status $HTTP_STATUS, retrying in 10s..."
            sleep 10
            if [ "$i" = "5" ]; then
              echo "Health check failed after 5 attempts"
              exit 1
            fi
          done

          # Qualities endpoint (public, seeded data)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/api/v1/qualities")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Qualities endpoint failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Qualities endpoint passed"

          echo "All smoke tests passed"

      - name: Output
        run: |
          echo "Staging deployment of '${{ inputs.service }}' successful"
