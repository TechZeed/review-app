name: deploy-mobile

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        type: choice
        options:
          - preview              # Android APK, sideload
          - production           # Android AAB, Play Internal
          - ios                  # iOS IPA, TestFlight
        default: preview
      submit:
        description: "Submit to store (Play Internal for production, TestFlight for ios; ignored for preview)"
        required: true
        type: boolean
        default: false
      release:
        description: "Attach the artifact to a GitHub Release for tester download"
        required: true
        type: boolean
        default: true
      confirm:
        description: "Type 'deploy-mobile' to confirm"
        required: true
        type: string

concurrency:
  group: deploy-mobile-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy-mobile" ]; then
            echo "Type 'deploy-mobile' to confirm."
            exit 1
          fi

  build:
    name: Build ${{ inputs.profile }}
    needs: validate
    # iOS builds require a macOS runner; Android can stay on ubuntu.
    runs-on: ${{ inputs.profile == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: 90
    permissions:
      contents: write  # needed to create the GitHub Release
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - uses: oven-sh/setup-bun@v2

      - name: Set up JDK 17 (Android only)
        if: inputs.profile != 'ios'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── Builds ──────────────────────────────────────────────────
      - name: Build APK (preview, local)
        if: inputs.profile == 'preview'
        run: eas build --platform android --profile preview --local --output ./preview.apk --non-interactive

      - name: Build AAB (production, local)
        if: inputs.profile == 'production'
        run: eas build --platform android --profile production --local --output ./build.aab --non-interactive

      - name: Build IPA (ios, local)
        if: inputs.profile == 'ios'
        run: eas build --platform ios --profile production --local --output ./build.ipa --non-interactive

      # ── Play Store submit (Android production only) ─────────────
      - name: Hydrate Play Store service account from vault
        if: inputs.profile == 'production' && inputs.submit
        run: echo '${{ secrets.EAS_SUBMIT_SA_B64 }}' | base64 -d > google-service-account.json

      - name: Submit AAB to Play Internal
        if: inputs.profile == 'production' && inputs.submit
        run: eas submit --platform android --path ./build.aab --non-interactive

      # ── TestFlight submit (iOS only) ────────────────────────────
      - name: Hydrate App Store Connect API key from vault
        if: inputs.profile == 'ios' && inputs.submit
        run: echo '${{ secrets.ASC_API_KEY_B64 }}' | base64 -d > asc-api-key.p8

      - name: Submit IPA to TestFlight
        if: inputs.profile == 'ios' && inputs.submit
        run: eas submit --platform ios --path ./build.ipa --non-interactive

      # ── Artifact + release (always, even if submit failed) ──────
      - name: Compute release tag
        id: tag
        if: success() || failure()
        run: |
          TS=$(date -u +'%Y%m%d-%H%M%S')
          echo "tag=mobile-${{ inputs.profile }}-${TS}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (14d retention)
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.tag.outputs.tag }}
          path: |
            apps/mobile/preview.apk
            apps/mobile/build.aab
            apps/mobile/build.ipa
          if-no-files-found: ignore
          retention-days: 14

      - name: Create GitHub Release
        if: inputs.release && (success() || failure())
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Mobile ${{ inputs.profile }} — ${{ steps.tag.outputs.tag }}
          body: |
            Mobile build produced by `deploy-mobile` workflow.
            Profile: `${{ inputs.profile }}`
            Commit: `${{ github.sha }}`

            Testers: APK (preview) installs by sideload. AAB is for Play Store.
            IPA is for TestFlight upload (or Apple-managed distribution).
          files: |
            apps/mobile/preview.apk
            apps/mobile/build.aab
            apps/mobile/build.ipa
          fail_on_unmatched_files: false

      - name: Cleanup secrets on runner
        if: always()
        run: rm -f google-service-account.json asc-api-key.p8 build.aab build.ipa preview.apk
