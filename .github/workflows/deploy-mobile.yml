name: deploy-mobile

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile (preview = APK for sideload, production = AAB for Play)"
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview
      submit:
        description: "Submit production AAB to Play Internal (ignored for preview)"
        required: true
        type: boolean
        default: false
      release:
        description: "Attach the artifact to a GitHub Release for tester download"
        required: true
        type: boolean
        default: true
      confirm:
        description: "Type 'deploy-mobile' to confirm"
        required: true
        type: string

concurrency:
  group: deploy-mobile
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy-mobile" ]; then
            echo "Type 'deploy-mobile' to confirm."
            exit 1
          fi

  build:
    name: Build ${{ inputs.profile }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # needed to create the GitHub Release
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - uses: oven-sh/setup-bun@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (preview, local)
        if: inputs.profile == 'preview'
        run: eas build --platform android --profile preview --local --output ./preview.apk --non-interactive

      - name: Build AAB (production, local)
        if: inputs.profile == 'production'
        run: eas build --platform android --profile production --local --output ./build.aab --non-interactive

      - name: Hydrate Play Store service account from vault
        if: inputs.profile == 'production' && inputs.submit
        run: echo '${{ secrets.EAS_SUBMIT_SA_B64 }}' | base64 -d > google-service-account.json

      - name: Submit AAB to Play Internal
        if: inputs.profile == 'production' && inputs.submit
        run: eas submit --platform android --path ./build.aab --non-interactive

      - name: Compute release tag
        id: tag
        if: success() || failure()
        run: |
          TS=$(date -u +'%Y%m%d-%H%M%S')
          echo "tag=mobile-${{ inputs.profile }}-${TS}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (14d retention)
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.tag.outputs.tag }}
          path: |
            apps/mobile/preview.apk
            apps/mobile/build.aab
          if-no-files-found: ignore
          retention-days: 14

      - name: Create GitHub Release
        if: inputs.release && (success() || failure())
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Mobile ${{ inputs.profile }} — ${{ steps.tag.outputs.tag }}
          body: |
            Android build produced by `deploy-mobile` workflow.
            Profile: `${{ inputs.profile }}`
            Commit: `${{ github.sha }}`

            Testers: download the APK (preview) and install on device. Production
            AABs are for Play Store — not installable directly.
          files: |
            apps/mobile/preview.apk
            apps/mobile/build.aab
          fail_on_unmatched_files: false

      - name: Cleanup
        if: always()
        run: rm -f google-service-account.json build.aab preview.apk
