name: deploy-mobile

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview
      build_mode:
        description: "Build mode"
        required: true
        type: choice
        options:
          - local
          - cloud
        default: local
      submit:
        description: "Submit to Play Store after build?"
        required: true
        type: boolean
        default: true
      confirm:
        description: "Type 'deploy-mobile' to confirm"
        required: true
        type: string

concurrency:
  group: deploy-mobile
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy-mobile" ]; then
            echo "Type 'deploy-mobile' to confirm."
            exit 1
          fi

  build-and-submit:
    name: Build & Submit (${{ inputs.profile }}, ${{ inputs.build_mode }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set up JDK 17 (for local builds)
        if: inputs.build_mode == 'local'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (local)
        if: inputs.build_mode == 'local'
        run: eas build --platform android --profile ${{ inputs.profile }} --local --output ./build.aab --non-interactive

      - name: Build Android (cloud)
        if: inputs.build_mode == 'cloud'
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive

      - name: Write Google Service Account key
        if: inputs.submit
        run: echo '${{ secrets.GOOGLE_PLAY_SA_KEY }}' > google-service-account.json

      - name: Submit to Play Store (local build)
        if: inputs.submit && inputs.build_mode == 'local'
        run: eas submit --platform android --path ./build.aab --non-interactive

      - name: Submit to Play Store (cloud build)
        if: inputs.submit && inputs.build_mode == 'cloud'
        run: eas submit --platform android --latest --non-interactive

      - name: Cleanup
        if: always()
        run: rm -f google-service-account.json build.aab
