name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - api
          - web
          - ui
          - all
        default: api
      confirm:
        description: "Type 'deploy-prod' to confirm production deployment"
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Trigger
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.confirm }}" != "deploy-prod" ]; then
            echo "Confirmation failed. Input 'deploy-prod' to proceed."
            exit 1
          fi

  ci:
    name: CI Checks
    needs: validate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production (${{ inputs.service }})
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: asia-southeast1
      GCP_ARTIFACT_REPOSITORY: review-apps
      CLOUDSQL_CONNECTION_NAME: ${{ secrets.CLOUDSQL_CONNECTION_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Remove .env files
        run: find . -name ".env*" -type f -delete && touch .env

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Deploy via deploy.js
        run: node deploy.js ${{ inputs.service }} prod

      - name: Health check (API only)
        id: health
        if: inputs.service == 'api' || inputs.service == 'all'
        run: |
          SERVICE_URL=$(gcloud run services describe review-api-prod \
            --region=${{ env.GCP_REGION }} \
            --format="value(status.url)" \
            --project=${{ env.GCP_PROJECT_ID }})

          echo "Checking health of review-api-prod at $SERVICE_URL"

          for i in $(seq 1 5); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i: status $HTTP_STATUS, retrying in 10s..."
            sleep 10
          done

          echo "healthy=false" >> "$GITHUB_OUTPUT"
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Output
        if: success()
        run: |
          echo "Production deployment of '${{ inputs.service }}' successful"
