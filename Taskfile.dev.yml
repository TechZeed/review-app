version: "3"

# dotenv is loaded by the parent Taskfile.yml (Task 3 disallows it in
# included files). $GCP_REGION, $GCP_PROJECT_ID etc. come from there.

vars:
  CLOUDSQL_CONNECTION: "{{.CLOUDSQL_CONNECTION_NAME}}"
  PROXY_PORT: "6199"
  REPO_ROOT:
    sh: git rev-parse --show-toplevel

tasks:
  # ─── Cloud SQL Proxy ─────────────────────────────────────────────────────────

  startproxy:
    desc: Start Cloud SQL Auth Proxy on localhost:{{.PROXY_PORT}}
    cmd: cloud-sql-proxy {{.CLOUDSQL_CONNECTION}} --port={{.PROXY_PORT}}

  psql:
    desc: Connect to dev Cloud SQL via proxy
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev psql"

  # ─── Database ────────────────────────────────────────────────────────────────

  migrate:
    desc: Run migrations on dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev migrate"

  migrate:down:
    desc: Rollback last migration on dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev migrate:down"

  migrate:status:
    desc: Show migration status on dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev migrate:status"

  seed:
    desc: Seed demo data on dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev seed"

  seed:down:
    desc: Remove seed data from dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev seed:down"

  # ─── Deploy ──────────────────────────────────────────────────────────────────

  deploy:api:
    desc: Deploy API to Cloud Run dev
    cmd: node {{.REPO_ROOT}}/infra/scripts/deploy.js api dev

  deploy:web:
    desc: Deploy Web to Cloud Run dev
    cmd: node {{.REPO_ROOT}}/infra/scripts/deploy.js web dev

  deploy:ui:
    desc: Deploy UI to Cloud Run dev
    cmd: node {{.REPO_ROOT}}/infra/scripts/deploy.js ui dev

  deploy:all:
    desc: Deploy all services to Cloud Run dev
    cmd: node {{.REPO_ROOT}}/infra/scripts/deploy.js all dev

  # ─── Mobile ──────────────────────────────────────────────────────────────────

  mobile:config:
    desc: Render apps/mobile/{eas,app}.json from templates using .env.dev
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/apply-mobile-config.ts

  deploy:mobile:
    desc: Build Android locally and submit to Play Store internal track
    deps: [mobile:config]
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmds:
      - eas build --platform android --profile production --local --output ./build.aab --non-interactive
      - eas submit --platform android --path ./build.aab --non-interactive
      - rm -f ./build.aab

  deploy:mobile:preview:
    desc: Build preview APK locally for sharing with testers
    deps: [mobile:config]
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmd: eas build --platform android --profile preview --local --output ./preview.apk

  deploy:mobile:cloud:
    desc: Build Android on EAS cloud and submit (last-resort when local fails)
    deps: [mobile:config]
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmds:
      - eas build --platform android --profile production --non-interactive
      - eas submit --platform android --latest --non-interactive

  deploy:mobile:ios:
    desc: Build iOS locally and submit to TestFlight (needs Xcode + Apple auth)
    deps: [mobile:config]
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmds:
      - eas build --platform ios --profile production --local --output ./build.ipa --non-interactive
      - eas submit --platform ios --path ./build.ipa --non-interactive
      - rm -f ./build.ipa

  deploy:mobile:ios:cloud:
    desc: Build iOS on EAS cloud and submit to TestFlight (fallback)
    deps: [mobile:config]
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmds:
      - eas build --platform ios --profile production --non-interactive
      - eas submit --platform ios --latest --non-interactive

  # ─── Logs ────────────────────────────────────────────────────────────────────

  logs:api:
    desc: View API logs in dev
    cmd: gcloud run services logs read review-api-dev --region=$GCP_REGION --limit=50 --project=$GCP_PROJECT_ID

  logs:web:
    desc: View Web logs in dev
    cmd: gcloud run services logs read review-web-dev --region=$GCP_REGION --limit=50 --project=$GCP_PROJECT_ID

  logs:ui:
    desc: View UI logs in dev
    cmd: gcloud run services logs read review-ui-dev --region=$GCP_REGION --limit=50 --project=$GCP_PROJECT_ID

  logs:
    desc: Stream live API logs to terminal + devlogs.log (tee)
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/devlogs.ts {{.CLI_ARGS}}

  # ─── Vault / Secrets ─────────────────────────────────────────────────────────

  sync:vault:
    desc: Distribute .env.dev values to GCP Secret Manager + GitHub Secrets
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/sync-vault.ts {{.CLI_ARGS}}

  sync:vault:dry:
    desc: Preview what sync:vault would push (no writes)
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/sync-vault.ts --dry

  vault:pull:
    desc: Fetch GCP vault files from Secret Manager to infra/dev/vault/
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/sync-vault.ts pull {{.CLI_ARGS}}

  # ─── Status ──────────────────────────────────────────────────────────────────

  status:
    desc: Show all Cloud Run services status
    cmd: gcloud run services list --region=$GCP_REGION --project=$GCP_PROJECT_ID --format="table(SERVICE,URL,LAST_DEPLOYED_BY)"

  health:
    desc: Check API health on dev
    cmd: curl -s $APP_BASE_URL/health | python3 -m json.tool
