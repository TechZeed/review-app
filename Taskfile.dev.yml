version: "3"

# dotenv is loaded by the parent Taskfile.yml (Task 3 disallows it in
# included files). $GCP_REGION, $GCP_PROJECT_ID etc. come from there.

vars:
  CLOUDSQL_CONNECTION: "{{.CLOUDSQL_CONNECTION_NAME}}"
  PROXY_PORT: "6199"
  REPO_ROOT:
    sh: git rev-parse --show-toplevel

tasks:
  # ─── Cloud SQL Proxy ─────────────────────────────────────────────────────────

  startproxy:
    desc: Start Cloud SQL Auth Proxy on localhost:{{.PROXY_PORT}}
    cmd: cloud-sql-proxy {{.CLOUDSQL_CONNECTION}} --port={{.PROXY_PORT}}

  psql:
    desc: Connect to dev Cloud SQL via proxy
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev psql"

  # ─── Database ────────────────────────────────────────────────────────────────

  migrate:
    desc: Run migrations on dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev migrate"

  migrate:down:
    desc: Rollback last migration on dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev migrate:down"

  migrate:status:
    desc: Show migration status on dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev migrate:status"

  seed:
    desc: Seed demo data on dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev seed"

  seed:down:
    desc: Remove seed data from dev Cloud SQL
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh dev seed:down"

  # ─── Deploy ──────────────────────────────────────────────────────────────────

  deploy:api:
    desc: Deploy API to Cloud Run dev
    deps: [migrate]
    cmd: node {{.REPO_ROOT}}/infra/scripts/deploy.js api dev

  deploy:web:
    desc: Deploy Web to Cloud Run dev
    cmd: node {{.REPO_ROOT}}/infra/scripts/deploy.js web dev

  deploy:ui:
    desc: Deploy UI to Cloud Run dev
    cmd: node {{.REPO_ROOT}}/infra/scripts/deploy.js ui dev

  deploy:all:
    desc: Deploy all services to Cloud Run dev
    deps: [migrate]
    cmd: node {{.REPO_ROOT}}/infra/scripts/deploy.js all dev

  # ─── Mobile ──────────────────────────────────────────────────────────────────
  # apps/mobile/{app,eas}.json are committed (EAS tarballs via git archive,
  # so gitignored files never reach the sandbox). Values in them are public
  # by design — they ship in every APK/IPA anyway. No render step needed.

  deploy:mobile:
    desc: Build Android locally and submit to Play Store internal track
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmds:
      - eas build --platform android --profile production --local --output ./build.aab --non-interactive
      - eas submit --platform android --path ./build.aab --non-interactive
      - rm -f ./build.aab

  deploy:mobile:preview:
    desc: Build preview APK locally for sharing with testers
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmd: eas build --platform android --profile preview --local --output ./preview.apk

  deploy:mobile:cloud:
    desc: Build Android on EAS cloud and submit (last-resort when local fails)
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmds:
      - eas build --platform android --profile production --non-interactive
      - eas submit --platform android --latest --non-interactive

  deploy:mobile:ios:
    desc: Build iOS locally and submit to TestFlight (needs Xcode + Apple auth)
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmds:
      - eas build --platform ios --profile production --local --output ./build.ipa --non-interactive
      - eas submit --platform ios --path ./build.ipa --non-interactive
      - rm -f ./build.ipa

  deploy:mobile:ios:cloud:
    desc: Build iOS on EAS cloud and submit to TestFlight (fallback)
    dir: "{{.REPO_ROOT}}/apps/mobile"
    cmds:
      - eas build --platform ios --profile production --non-interactive
      - eas submit --platform ios --latest --non-interactive

  # ─── Logs ────────────────────────────────────────────────────────────────────

  logs:api:
    desc: View API logs in dev
    cmd: gcloud run services logs read review-api-dev --region=$GCP_REGION --limit=50 --project=$GCP_PROJECT_ID

  logs:web:
    desc: View Web logs in dev
    cmd: gcloud run services logs read review-web-dev --region=$GCP_REGION --limit=50 --project=$GCP_PROJECT_ID

  logs:ui:
    desc: View UI logs in dev
    cmd: gcloud run services logs read review-ui-dev --region=$GCP_REGION --limit=50 --project=$GCP_PROJECT_ID

  logs:
    desc: Stream live API logs to terminal + devlogs.log (tee)
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/devlogs.ts {{.CLI_ARGS}}

  # ─── Vault / Secrets ─────────────────────────────────────────────────────────

  sync:vault:
    desc: Distribute .env.dev values to GCP Secret Manager + GitHub Secrets
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/sync-vault.ts {{.CLI_ARGS}}

  sync:vault:dry:
    desc: Preview what sync:vault would push (no writes)
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/sync-vault.ts --dry

  vault:pull:
    desc: Fetch GCP vault files from Secret Manager to infra/dev/vault/
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/sync-vault.ts pull {{.CLI_ARGS}}

  # ─── Dev bundle — one-shot bootstrap (.env.dev + vault files) ───────────────

  bundle:push:
    desc: Upload .env.dev + infra/dev/vault/ to GCP Secret Manager as review-dev-bundle
    cmd: bun run --env-file={{.REPO_ROOT}}/.env.dev {{.REPO_ROOT}}/infra/scripts/dev-bundle.ts push

  test:regression:
    desc: Run E2E regression suite against dev (spec 25)
    dir: "{{.REPO_ROOT}}/apps/regression"
    cmd: cd {{.REPO_ROOT}}/apps/regression && set -a && . {{.REPO_ROOT}}/.env.regression && set +a && npx --no-install playwright test {{.CLI_ARGS}}

  test:regression:smoke:
    desc: Regression smoke only (API reachable + seeded login works)
    dir: "{{.REPO_ROOT}}/apps/regression"
    cmd: cd {{.REPO_ROOT}}/apps/regression && set -a && . {{.REPO_ROOT}}/.env.regression && set +a && npx --no-install playwright test --project=smoke

  # ─── Mobile regression (Maestro, spec 35) ────────────────────────────────────

  test:regression:mobile:
    desc: Run Maestro flows against a connected Android device or running emulator
    dir: "{{.REPO_ROOT}}/apps/regression/maestro"
    cmd: $HOME/.maestro/bin/maestro test .

  test:regression:mobile:flow:
    desc: Run a single Maestro flow, e.g. `task dev:test:regression:mobile:flow -- 01-launch.yaml`
    dir: "{{.REPO_ROOT}}/apps/regression/maestro"
    cmd: $HOME/.maestro/bin/maestro test {{.CLI_ARGS}}

  test:regression:mobile:install:
    desc: Install the latest preview APK from GitHub Releases onto the connected device
    cmd: |
      mkdir -p /tmp/reviewapp-regression
      TAG=$(gh release list --limit 10 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("mobile-preview-"))] | sort_by(.createdAt) | reverse | .[0].tagName')
      echo "Installing preview APK from $TAG"
      gh release download "$TAG" --pattern preview.apk --dir /tmp/reviewapp-regression --clobber
      adb install -r /tmp/reviewapp-regression/preview.apk

  test:regression:mobile:emulator:
    desc: Boot an Android emulator (default pixel_7_api_34), install latest preview APK, run Maestro
    cmd: |
      EMULATOR_NAME="{{.CLI_ARGS | default "pixel_7_api_34"}}"
      $ANDROID_HOME/emulator/emulator -avd "$EMULATOR_NAME" -no-snapshot -no-audio &
      adb wait-for-device && adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
      TAG=$(gh release list --limit 10 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("mobile-preview-"))] | sort_by(.createdAt) | reverse | .[0].tagName')
      mkdir -p /tmp/reviewapp-regression
      gh release download "$TAG" --pattern preview.apk --dir /tmp/reviewapp-regression --clobber
      adb install -r /tmp/reviewapp-regression/preview.apk
      cd {{.REPO_ROOT}}/apps/regression/maestro && $HOME/.maestro/bin/maestro test .

  bundle:pull:
    desc: Fetch review-dev-bundle from GCP Secret Manager (falls back to `gcloud config` project) and unpack into repo root
    cmd: bun run {{.REPO_ROOT}}/infra/scripts/dev-bundle.ts pull {{.CLI_ARGS}}

  # ─── OpenAPI contract ────────────────────────────────────────────────────────

  openapi:regen:
    desc: Regenerate docs/openapi.yaml from apps/api Zod schemas + route tables
    cmd: cd {{.REPO_ROOT}}/apps/api && npx tsx src/scripts/generate-openapi.ts

  # ─── Play Console ────────────────────────────────────────────────────────────

  play:status:
    desc: Query Play Console (via eas-submit SA) for app identity, listings, and track releases
    cmd: bun run {{.REPO_ROOT}}/infra/scripts/play-status.ts {{.CLI_ARGS}}

  play:listing:push:
    desc: Push apps/mobile/store-listing.yml to Play Console (text fields + privacy policy)
    cmd: bun run {{.REPO_ROOT}}/infra/scripts/play-listing-push.ts {{.CLI_ARGS}}

  play:images:push:
    desc: Upload apps/mobile/store-assets/* to Play Console (icon, feature graphic, screenshots)
    cmd: bun run {{.REPO_ROOT}}/infra/scripts/play-images-push.ts {{.CLI_ARGS}}

  play:assets:regenerate:
    desc: Regenerate Play Store assets (icon, feature graphic, screenshots) into apps/mobile/store-assets/
    cmd: bun run {{.REPO_ROOT}}/infra/scripts/capture-store-screenshots.ts {{.CLI_ARGS}}

  # ─── Status ──────────────────────────────────────────────────────────────────

  status:
    desc: Show all Cloud Run services status
    cmd: gcloud run services list --region=$GCP_REGION --project=$GCP_PROJECT_ID --format="table(SERVICE,URL,LAST_DEPLOYED_BY)"

  health:
    desc: Check API health on dev
    cmd: curl -s $APP_BASE_URL/health | python3 -m json.tool
