version: "3"

vars:
  REPO_ROOT:
    sh: git rev-parse --show-toplevel
  COMPOSE: docker compose --env-file {{.REPO_ROOT}}/.env -f {{.REPO_ROOT}}/infra/local/docker-compose.yaml

tasks:
  # ─── Infra (Postgres via docker-compose) ─────────────────────────────────────

  infra:up:
    desc: Start local Postgres (docker-compose, port from .env)
    cmd: "{{.COMPOSE}} up -d"

  infra:down:
    desc: Stop local Postgres (keeps data volume)
    cmd: "{{.COMPOSE}} down"

  infra:reset:
    desc: Stop local Postgres + DESTROY data volume
    cmd: "{{.COMPOSE}} down -v"

  infra:ps:
    desc: Show local infra status
    cmd: "{{.COMPOSE}} ps"

  infra:wait:
    desc: Block until Postgres is healthy
    cmd: |
      echo "Waiting for Postgres to be healthy..."
      for i in $(seq 1 30); do
        state=$({{.COMPOSE}} ps --format json postgres 2>/dev/null | grep -o '"Health":"[^"]*"' | cut -d'"' -f4)
        [ "$state" = "healthy" ] && echo "Postgres healthy" && exit 0
        sleep 1
      done
      echo "Postgres did not become healthy in 30s" && exit 1

  bootstrap:
    desc: First-run setup — start infra, run migrations, seed demo data
    cmds:
      - task: infra:up
      - task: infra:wait
      - task: migrate
      - task: seed

  dev:
    desc: Day-to-day — ensure infra is up, then start API dev server
    cmds:
      - task: infra:up
      - task: infra:wait
      - task: server

  # ─── Dev Server ──────────────────────────────────────────────────────────────

  server:
    desc: Start API dev server (port from .env PORT, default 6510)
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local server"

  dev:ui:
    desc: Start UI Vite dev server (port from apps/ui/vite.config.ts, currently 6513)
    env:
      APP_ENV: local
    cmd: |
      cd {{.REPO_ROOT}}/apps/ui && npx vite

  dev:web:
    desc: Start Web Vite dev server (port from apps/web/vite.config.ts, currently 6514)
    env:
      APP_ENV: local
    cmd: |
      cd {{.REPO_ROOT}}/apps/web && npx vite

  # ─── Database ────────────────────────────────────────────────────────────────

  migrate:
    desc: Run database migrations
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local migrate"

  migrate:down:
    desc: Rollback last migration
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local migrate:down"

  migrate:status:
    desc: Show migration status
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local migrate:status"

  seed:
    desc: Seed demo data
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local seed"

  seed:down:
    desc: Remove seed data
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local seed:down"

  psql:
    desc: Connect to local Postgres
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local psql"

  # ─── Stripe ──────────────────────────────────────────────────────────────────

  stripe:listen:
    desc: Forward Stripe webhooks to local API (PORT from .env)
    cmd: stripe listen --forward-to http://localhost:${PORT:-6510}/api/v1/subscriptions/webhook

  # ─── Quality ─────────────────────────────────────────────────────────────────

  test:
    desc: Run unit tests (integration suite lives in Taskfile.test.yml — use `task test:integration`)
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local test"

  build:
    desc: TypeScript build check (API)
    cmd: "{{.REPO_ROOT}}/infra/scripts/run.sh local build"

  build:web:
    desc: tsc + vite build check for apps/web (mirrors the Cloud Run build step)
    env:
      APP_ENV: '{{.APP_ENV | default "local"}}'
    cmd: |
      cd {{.REPO_ROOT}}/apps/web && npm run build

  build:ui:
    desc: tsc + vite build check for apps/ui (mirrors the Cloud Run build step)
    env:
      APP_ENV: '{{.APP_ENV | default "local"}}'
    cmd: |
      cd {{.REPO_ROOT}}/apps/ui && npm run build
