version: "3"

vars:
  CLOUDSQL_CONNECTION: humini-review:asia-southeast1:review-db-dev
  PROXY_PORT: "6199"

tasks:
  # ─── Cloud SQL Proxy ─────────────────────────────────────────────────────────

  startproxy:
    desc: Start Cloud SQL Auth Proxy on localhost:{{.PROXY_PORT}}
    cmd: cloud-sql-proxy {{.CLOUDSQL_CONNECTION}} --port={{.PROXY_PORT}}

  # ─── Dev Server ──────────────────────────────────────────────────────────────

  server:
    desc: Start API dev server (requires proxy running)
    cmd: npx tsx --env-file=.env src/server.ts

  start:
    desc: Start proxy + dev server together
    cmds:
      - task: startproxy &
      - sleep 2
      - task: server

  # ─── Database ────────────────────────────────────────────────────────────────

  migrate:
    desc: Run database migrations
    cmd: npx tsx --env-file=.env src/db/cli.ts up

  migrate:down:
    desc: Rollback last migration
    cmd: npx tsx --env-file=.env src/db/cli.ts down

  migrate:status:
    desc: Show migration status
    cmd: npx tsx --env-file=.env src/db/cli.ts status

  seed:
    desc: Seed demo data
    cmd: npx tsx --env-file=.env src/db/seed-cli.ts up

  seed:down:
    desc: Remove seed data
    cmd: npx tsx --env-file=.env src/db/seed-cli.ts down

  psql:
    desc: Connect to Cloud SQL via psql through proxy
    cmd: PGPASSWORD=$(grep POSTGRES_PASSWORD .env | cut -d= -f2) psql -h localhost -p {{.PROXY_PORT}} -U review_user -d review_app

  # ─── Stripe ──────────────────────────────────────────────────────────────────

  stripe:listen:
    desc: Forward Stripe webhooks to local API
    cmd: stripe listen --forward-to http://localhost:3000/api/v1/subscriptions/webhook

  # ─── Quality ─────────────────────────────────────────────────────────────────

  test:
    desc: Run tests
    cmd: npx vitest run

  build:
    desc: TypeScript build check
    cmd: npx tsc --noEmit
