version: "3"

tasks:
  # ─── Dev Server ──────────────────────────────────────────────────────────────

  server:
    desc: Start API dev server
    cmd: ./run.sh local server

  # ─── Database ────────────────────────────────────────────────────────────────

  migrate:
    desc: Run database migrations
    cmd: ./run.sh local migrate

  migrate:down:
    desc: Rollback last migration
    cmd: ./run.sh local migrate:down

  migrate:status:
    desc: Show migration status
    cmd: ./run.sh local migrate:status

  seed:
    desc: Seed demo data
    cmd: ./run.sh local seed

  seed:down:
    desc: Remove seed data
    cmd: ./run.sh local seed:down

  psql:
    desc: Connect to local Postgres
    cmd: ./run.sh local psql

  # ─── Stripe ──────────────────────────────────────────────────────────────────

  stripe:listen:
    desc: Forward Stripe webhooks to local API
    cmd: stripe listen --forward-to http://localhost:3000/api/v1/subscriptions/webhook

  # ─── Quality ─────────────────────────────────────────────────────────────────

  test:
    desc: Run unit tests (integration suite lives in Taskfile.test.yml — use `task test:integration`)
    cmd: ./run.sh local test

  build:
    desc: TypeScript build check
    cmd: ./run.sh local build
