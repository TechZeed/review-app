version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: review_app
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "6132:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review_user -d review_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: review_app
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: changeme
      JWT_SECRET: local-dev-secret-must-be-at-least-32-chars
      FIREBASE_PROJECT_ID: local-dev
      GCP_BUCKET_NAME: local-dev-bucket
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
