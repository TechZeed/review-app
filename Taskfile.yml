version: "3"

# Each label carries its own dotenv scope at the include site.
# Task 3 forbids `dotenv:` inside an included file, and a parent-level
# dotenv would leak across labels (dev env into test, etc.).

includes:
  # Bootstrap bundle tasks — NO dotenv at include site (must work on fresh
  # clone before .env.<env> exists). Each env owns its own file under infra/.
  #   task infra:dev:pull / :push
  infra:
    taskfile: ./infra/Taskfile.yml
  local:
    taskfile: Taskfile.local.yml
    dotenv: [".env"]
  dev:
    taskfile: Taskfile.dev.yml
    dotenv: [".env.dev"]
  test:
    taskfile: Taskfile.test.yml
    dotenv: [".env.test"]

  # Prod mirrors dev one-for-one. Uncomment when .env.prod exists.
  # Every task added under `dev:` must also exist under `prod:` — same
  # names, same shape, different dotenv scope. See CLAUDE.md "Core rules".
  # prod:
  #   taskfile: Taskfile.prod.yml
  #   dotenv: [".env.prod"]

tasks:
  # Meta utilities (no dotenv scope — must work in a blank worktree).

  worktree:link:
    desc: Symlink gitignored shared files (.env.*, infra/dev/vault) from primary worktree into current worktree
    cmd: bash infra/scripts/worktree-link.sh
